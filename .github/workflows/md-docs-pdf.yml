# Generate markdown docs to static/docs/ pdfs
name: MD Docs PDF Conversion
on:
  push: 
    paths:
      - "docs/**.md"
      - "docs/images/**"
  workflow_dispatch:

jobs:
  md-to-pdf:
    name: Convert MD Docs to PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_path: docs
          output_dir: static/docs
          images_dir: docs/images
          image_import: ./images
          build_html: true # set to true to debug html output

      - name: Commit generated PDFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generated PDFs from MD docs"
          branch: ${{ github.ref_name }}
          file_pattern: "static/docs/**/*.pdf"
      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: static/docs
